{% extends "base.html" %}
{% block title %}因式分解 — 多项式因式分解{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.factorize-layout {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 20px;
}

.factorize-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 24px;
  box-shadow: var(--shadow-sm);
}

.factorize-card + .factorize-card { margin-top: 16px; }

.factorize-input-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
}

.factorize-input {
  flex: 1;
  padding: 14px 18px;
  font-size: 20px;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg-input);
  color: var(--text);
  transition: border-color 0.15s;
}
.factorize-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.factorize-input::placeholder { color: var(--text-muted); font-size: 16px; }

.factorize-btn {
  padding: 14px 28px;
  font-size: 17px;
  font-weight: 700;
  font-family: var(--font);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.12s;
}
.factorize-btn:hover { background: var(--accent-hover); box-shadow: 0 4px 12px rgba(108,92,231,0.35); }
.factorize-btn:active { transform: scale(0.97); }

.factorize-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.factorize-example {
  padding: 6px 14px;
  font-size: 14px;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.12s;
}
.factorize-example:hover {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}

.factorize-result {
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  padding: 16px;
  overflow-x: auto;
}
.factorize-result .katex { font-size: 1.2em; }

.factorize-steps { list-style: none; padding: 0; margin: 0; }
.factorize-steps li {
  padding: 10px 16px;
  font-size: 15px;
  color: var(--text);
  border-bottom: 1px solid var(--border-light);
  line-height: 1.7;
}
.factorize-steps li:last-child {
  border-bottom: none;
  font-weight: 700;
  color: var(--accent);
  font-size: 16px;
}
.factorize-steps li .step-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 13px;
  font-weight: 700;
  margin-right: 10px;
  flex-shrink: 0;
}

.factorize-error {
  padding: 14px 18px;
  color: #e74c3c;
  background: rgba(231,76,60,0.08);
  border-radius: 8px;
  text-align: center;
  font-weight: 600;
}

.factorize-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 20px;
  font-size: 14px;
}

@media (max-width: 600px) {
  .factorize-input-row { flex-direction: column; }
  .factorize-btn { width: 100%; }
  .factorize-input { font-size: 18px; }
}
</style>
{% endblock %}

{% block content %}
<div class="factorize-layout">
  <div class="factorize-card">
    <div class="factorize-input-row">
      <input
        type="text"
        class="factorize-input"
        id="facInput"
        placeholder="输入多项式，如 x^2 - 5x + 6"
        autofocus
        autocomplete="off"
      >
      <button class="factorize-btn" id="facBtn">因式分解</button>
    </div>

    <div class="factorize-examples" id="facExamples"></div>
  </div>

  <div class="factorize-card" id="facResultCard" style="display:none;">
    <div class="factorize-result" id="facResult"></div>
  </div>

  <div class="factorize-card" id="facStepsCard" style="display:none;">
    <ol class="factorize-steps" id="facSteps"></ol>
  </div>

  <div class="factorize-card" id="facErrorCard" style="display:none;">
    <div class="factorize-error" id="facError"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script>
(function() {
  const input = document.getElementById('facInput');
  const btn = document.getElementById('facBtn');
  const resultDiv = document.getElementById('facResult');
  const resultCard = document.getElementById('facResultCard');
  const stepsList = document.getElementById('facSteps');
  const stepsCard = document.getElementById('facStepsCard');
  const errorDiv = document.getElementById('facError');
  const errorCard = document.getElementById('facErrorCard');
  const examplesDiv = document.getElementById('facExamples');

  const EXAMPLES = [
    { label: 'x²-1', expr: 'x^2 - 1' },
    { label: 'x²-5x+6', expr: 'x^2 - 5x + 6' },
    { label: 'x³-8', expr: 'x^3 - 8' },
    { label: 'a²-b²', expr: 'a^2 - b^2' },
    { label: 'x⁴-1', expr: 'x^4 - 1' },
    { label: 'x²+7x+12', expr: 'x^2 + 7x + 12' },
    { label: '2x²+5x-3', expr: '2x^2 + 5x - 3' },
    { label: 'x²+4x+4', expr: 'x^2 + 4x + 4' },
  ];

  EXAMPLES.forEach(function(ex) {
    var btn = document.createElement('button');
    btn.className = 'factorize-example';
    btn.textContent = ex.label;
    btn.title = ex.expr;
    btn.addEventListener('click', function() {
      input.value = ex.expr;
      doFactorize();
    });
    examplesDiv.appendChild(btn);
  });

  function hideAll() {
    resultCard.style.display = 'none';
    stepsCard.style.display = 'none';
    errorCard.style.display = 'none';
  }

  function showError(msg) {
    hideAll();
    errorDiv.textContent = msg;
    errorCard.style.display = '';
    // Don't hide result/steps if there's also partial output
  }

  function renderLatex(el, tex) {
    try {
      katex.render(tex, el, { throwOnError: false, displayMode: false });
    } catch (e) {
      el.textContent = tex;
    }
  }

  function doFactorize() {
    var expr = input.value.trim();
    if (!expr) {
      showError('请输入表达式');
      return;
    }

    btn.textContent = '计算中...';
    btn.disabled = true;

    fetch('/factorize/api/factor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ expression: expr })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.textContent = '因式分解';
      btn.disabled = false;

      if (data.error) {
        showError(data.error);
        return;
      }

      hideAll();

      // Show result
      resultDiv.innerHTML = '';
      if (data.is_constant) {
        resultDiv.textContent = data.factored;
      } else if (data.factored_unicode && data.factored_unicode !== data.factored) {
        resultDiv.textContent = data.factored_unicode;
      } else {
        renderLatex(resultDiv, data.factored);
      }
      resultCard.style.display = '';

      // Show steps
      if (data.steps && data.steps.length > 0) {
        stepsList.innerHTML = '';
        data.steps.forEach(function(step, i) {
          var li = document.createElement('li');
          var num = document.createElement('span');
          num.className = 'step-num';
          num.textContent = (i + 1);
          var text = document.createElement('span');
          // Render inline KaTeX within step text
          var parts = step.split(/(\$[^$]+\$)/g);
          parts.forEach(function(part) {
            if (part.startsWith('$') && part.endsWith('$')) {
              var span = document.createElement('span');
              renderLatex(span, part.slice(1, -1));
              text.appendChild(span);
            } else {
              text.appendChild(document.createTextNode(part));
            }
          });
          li.appendChild(num);
          li.appendChild(text);
          stepsList.appendChild(li);
        });
        stepsCard.style.display = '';
      }
    })
    .catch(function(err) {
      btn.textContent = '因式分解';
      btn.disabled = false;
      showError('网络错误，请重试');
    });
  }

  btn.addEventListener('click', doFactorize);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); doFactorize(); }
  });

  // If there's a hash with a preset expression, load it
  if (window.location.hash) {
    try {
      input.value = decodeURIComponent(window.location.hash.slice(1));
    } catch(_) {}
  }
})();
</script>
{% endblock %}
