{% extends "base.html" %}
{% block title %}分享的文档 — Markdown 渲染{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.share-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 24px;
}
.share-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 16px; margin-bottom: 24px;
  border-bottom: 1px solid var(--border-light);
}
.share-header h1 { font-size: 18px; font-weight: 600; }
.share-header .meta { font-size: 12px; color: var(--text-muted); }
.share-error {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.share-error h2 { font-size: 24px; margin-bottom: 8px; color: var(--text-secondary); }

/* rendered content styles */
.share-content {
  font-size: 15px; line-height: 1.8; color: var(--text);
  word-wrap: break-word;
}
.share-content h1 { font-size: 1.8em; margin: 1em 0 0.5em; border-bottom: 2px solid var(--border-light); padding-bottom: 8px; }
.share-content h2 { font-size: 1.45em; margin: 1.2em 0 0.4em; }
.share-content h3 { font-size: 1.2em; margin: 1em 0 0.3em; }
.share-content p { margin: 0.6em 0; }
.share-content ul, .share-content ol { padding-left: 1.8em; margin: 0.5em 0; }
.share-content li { margin: 0.25em 0; }
.share-content blockquote {
  border-left: 4px solid var(--accent); padding: 6px 16px;
  margin: 0.8em 0; background: var(--accent-light); border-radius: 0 6px 6px 0;
  color: var(--text-secondary);
}
.share-content code {
  background: var(--bg-input); padding: 2px 6px; border-radius: 4px;
  font-family: "SF Mono","Fira Code",monospace; font-size: 0.9em;
}
.share-content pre {
  background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 8px;
  overflow-x: auto; margin: 0.8em 0; line-height: 1.6;
}
.share-content pre code { background: transparent; padding: 0; color: inherit; }
.share-content table {
  border-collapse: collapse; width: 100%; margin: 0.8em 0;
}
.share-content th, .share-content td {
  border: 1px solid var(--border); padding: 8px 12px; text-align: left;
}
.share-content th { background: var(--bg-input); font-weight: 600; }
.share-content img { max-width: 100%; border-radius: 8px; }
.share-content hr { border: none; border-top: 1px solid var(--border-light); margin: 1.5em 0; }
.share-content .katex-display { margin: 0.8em 0; overflow-x: auto; overflow-y: hidden; }

.share-actions {
  margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border-light);
  text-align: center;
}
.share-actions a {
  display: inline-block; padding: 8px 20px;
  background: var(--accent); color: #fff; border-radius: 8px;
  font-weight: 600; transition: background 0.15s;
}
.share-actions a:hover { background: var(--accent-hover); color: #fff; }
</style>
{% endblock %}

{% block content %}
<div class="share-container">
  {% if error %}
    <div class="share-error">
      <h2>404</h2>
      <p>{{ error }}</p>
    </div>
  {% else %}
    <div class="share-header">
      <h1>📝 分享的文档</h1>
      <span class="meta">{{ created_at[:19] if created_at else '' }}</span>
    </div>
    <div class="share-content" id="shareContent"></div>
    <div class="share-actions">
      <a href="/mdrender">✏️ 打开编辑器</a>
    </div>
  {% endif %}
</div>
{% endblock %}

{% block scripts %}
<script id="shareData" type="text/json">{{ content | tojson | safe }}</script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script>
(function() {
  const el = document.getElementById('shareData');
  if (!el) return;
  const raw = JSON.parse(el.textContent);
  const container = document.getElementById('shareContent');
  if (!container || !raw) return;

  // protect code blocks
  const codes = [];
  let text = raw.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
    codes.push({ lang, code: code.trimEnd() });
    return `%%CODE_${codes.length - 1}%%`;
  });
  // protect inline code
  const icodes = [];
  text = text.replace(/`([^`]+)`/g, (m, code) => {
    icodes.push(code);
    return `%%ICODE_${icodes.length - 1}%%`;
  });

  // protect block formulas
  const blocks = [];
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (m, f) => { blocks.push(f.trim()); return `%%BLOCK_${blocks.length - 1}%%`; });
  // protect inline formulas
  const inlines = [];
  text = text.replace(/\$(.*?)\$/g, (m, f) => { inlines.push(f.trim()); return `%%INLINE_${inlines.length - 1}%%`; });

  let html = marked.parse(text);

  html = html.replace(/%%BLOCK_(\d+)%%/g, (_, i) => {
    try { return katex.renderToString(blocks[i], { displayMode: true, throwOnError: false }); }
    catch(e) { return `<pre>${blocks[i]}</pre>`; }
  });
  html = html.replace(/%%INLINE_(\d+)%%/g, (_, i) => {
    try { return katex.renderToString(inlines[i], { displayMode: false, throwOnError: false }); }
    catch(e) { return `<code>${inlines[i]}</code>`; }
  });
  html = html.replace(/%%CODE_(\d+)%%/g, (_, i) => {
    const c = codes[i];
    return `<pre><code class="language-${c.lang}">${c.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
  });
  html = html.replace(/%%ICODE_(\d+)%%/g, (_, i) => `<code>${icodes[i].replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code>`);

  container.innerHTML = html;
})();
</script>
{% endblock %}
