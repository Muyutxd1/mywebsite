{% extends "base.html" %}
{% block title %}Markdown + LaTeX 实时渲染器{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.mdrender-layout {
  display: flex;
  height: calc(100vh - 60px - 40px);
  margin: -32px -24px 0;
}

/* ── Left panel ──────────────────── */
.mdrender-left {
  width: 50%; min-width: 320px;
  display: flex; flex-direction: column;
  background: var(--bg-card);
  border-right: 1px solid var(--border-light);
}

.mdrender-toolbar {
  display: flex; gap: 6px; padding: 8px 12px;
  border-bottom: 1px solid var(--border-light);
  flex-wrap: wrap; align-items: center;
}
.mdrender-toolbar .sep {
  width: 1px; height: 20px; background: var(--border); margin: 0 4px;
}

.mdrender-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  font-family: var(--font); border: 1.5px solid var(--border); border-radius: 6px;
  background: #fff; color: var(--text); cursor: pointer; transition: all 0.12s;
  white-space: nowrap; display: flex; align-items: center; gap: 4px;
}
.mdrender-btn:hover { background: var(--accent-light); border-color: var(--accent); }
.mdrender-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.mdrender-btn.primary:hover { background: var(--accent-hover); }

.mdrender-editor-wrap {
  flex: 1; position: relative; overflow: hidden;
}
.mdrender-editor {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  padding: 16px 20px;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", monospace;
  font-size: 14px; line-height: 1.7;
  border: none; resize: none; outline: none;
  background: var(--bg-card); color: var(--text);
  tab-size: 2;
}
.mdrender-editor::placeholder {
  color: var(--text-muted); font-family: var(--font); font-size: 14px;
}

/* ── Right panel ─────────────────── */
.mdrender-right {
  flex: 1; display: flex; flex-direction: column;
  background: #fafbfc; overflow: hidden;
}
.mdrender-preview-wrap {
  flex: 1; overflow-y: auto; padding: 20px 28px;
}
.mdrender-preview {
  max-width: 720px; margin: 0 auto;
  font-size: 15px; line-height: 1.8; color: var(--text);
  word-wrap: break-word;
}

/* preview typography */
.mdrender-preview h1 { font-size: 1.8em; margin: 0.8em 0 0.4em; border-bottom: 2px solid var(--border-light); padding-bottom: 8px; }
.mdrender-preview h2 { font-size: 1.4em; margin: 1em 0 0.35em; }
.mdrender-preview h3 { font-size: 1.15em; margin: 0.8em 0 0.3em; }
.mdrender-preview h4 { font-size: 1.05em; margin: 0.7em 0 0.25em; }
.mdrender-preview p { margin: 0.55em 0; }
.mdrender-preview ul, .mdrender-preview ol { padding-left: 1.6em; margin: 0.4em 0; }
.mdrender-preview li { margin: 0.2em 0; }
.mdrender-preview blockquote {
  border-left: 4px solid var(--accent); padding: 4px 14px;
  margin: 0.7em 0; background: var(--accent-light); border-radius: 0 6px 6px 0;
  color: var(--text-secondary);
}
.mdrender-preview code {
  background: var(--bg-input); padding: 2px 5px; border-radius: 4px;
  font-family: "SF Mono","Fira Code",monospace; font-size: 0.88em;
}
.mdrender-preview pre {
  background: #1e1e2e; color: #cdd6f4; padding: 14px 18px; border-radius: 8px;
  overflow-x: auto; margin: 0.7em 0; line-height: 1.55; font-size: 13px;
}
.mdrender-preview pre code { background: transparent; padding: 0; color: inherit; }
.mdrender-preview table { border-collapse: collapse; width: 100%; margin: 0.7em 0; }
.mdrender-preview th, .mdrender-preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
.mdrender-preview th { background: var(--bg-input); font-weight: 600; }
.mdrender-preview img { max-width: 100%; border-radius: 8px; }
.mdrender-preview hr { border: none; border-top: 1px solid var(--border-light); margin: 1.3em 0; }
.mdrender-preview .katex-display { margin: 0.7em 0; overflow-x: auto; overflow-y: hidden; }
.mdrender-preview .katex { font-size: 1.05em; }

/* ── Status bar ──────────────────── */
.mdrender-status {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--text-muted);
  padding: 5px 16px; border-top: 1px solid var(--border-light);
  background: var(--bg-card);
}
.mdrender-status .status-copied { color: #27ae60; font-weight: 600; }

/* ── Toast ───────────────────────── */
.mdrender-toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: #1e1e2e; color: #fff; padding: 10px 24px; border-radius: 20px;
  font-size: 13px; font-weight: 600; z-index: 999;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.mdrender-toast.show { opacity: 1; }

/* ── Responsive ──────────────────── */
@media (max-width: 768px) {
  .mdrender-layout { flex-direction: column; height: auto; }
  .mdrender-left { width: 100%; min-width: 0; height: 45vh; border-right: none; border-bottom: 1px solid var(--border-light); }
  .mdrender-right { height: 55vh; min-height: 350px; }
}
</style>
{% endblock %}

{% block content %}
<div class="mdrender-layout">

  <div class="mdrender-left">
    <div class="mdrender-toolbar">
      <button class="mdrender-btn" id="mdBtnDemo" title="填入示例文档">📋 示例</button>
      <button class="mdrender-btn" id="mdBtnClear" title="清空编辑器">🗑 清空</button>
      <span class="sep"></span>
      <button class="mdrender-btn" id="mdBtnInline" title="插入行内公式 $...$">𝑓 行内公式</button>
      <button class="mdrender-btn" id="mdBtnBlock" title="插入块级公式 $$...$$">ƒ 块级公式</button>
      <span class="sep"></span>
      <button class="mdrender-btn" id="mdBtnExport" title="导出预览为图片">🖼 导出图片</button>
      <button class="mdrender-btn primary" id="mdBtnShare" title="生成分享链接">🔗 分享</button>
    </div>
    <div class="mdrender-editor-wrap">
      <textarea class="mdrender-editor" id="mdEditor"
        placeholder="# 开始写 Markdown...&#10;&#10;行内公式：$E = mc^2$&#10;&#10;块级公式：$$\sum_{k=1}^n k = \frac{n(n+1)}{2}$$&#10;&#10;表格、代码块、引用……都支持。"></textarea>
    </div>
  </div>

  <div class="mdrender-right">
    <div class="mdrender-preview-wrap">
      <div class="mdrender-preview" id="mdPreview"></div>
    </div>
    <div class="mdrender-status">
      <span id="mdStatus">就绪</span>
      <span id="mdCounts">0 字 · 0 公式</span>
    </div>
  </div>

</div>

<div class="mdrender-toast" id="mdToast"></div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="{{ url_for('static', filename='js/mdrender.js') }}"></script>
{% endblock %}
