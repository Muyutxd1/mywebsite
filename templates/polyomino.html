{% extends "base.html" %}
{% block title %}Polyomino Puzzle Studio — 数学拼图{% endblock %}

{% block head %}
<style>
/* Inline critical layout styles, detailed styles in style.css */
</style>
{% endblock %}

{% block content %}
<div class="polyomino-layout" id="polyominoApp">

  <!-- Sidebar -->
  <aside class="polyomino-sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">🧩 拼图库</h3>
      <div class="piece-library" id="pieceLibrary">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="sidebar-section" id="activePiecePanel" style="display:none;">
      <h3 class="sidebar-title">当前拼图块</h3>
      <canvas class="active-preview-canvas" id="activePreviewCanvas" width="120" height="120"></canvas>
      <div class="active-piece-name" id="activePieceName"></div>
      <div class="transform-controls">
        <button class="btn btn-sm" id="btnRotate" title="旋转 90° (R)">↻ 旋转</button>
        <button class="btn btn-sm" id="btnFlipH" title="水平翻转 (H)">↔ 水平翻转</button>
        <button class="btn btn-sm" id="btnFlipV" title="垂直翻转 (V)">↕ 垂直翻转</button>
      </div>
      <div class="active-piece-count" id="activePieceCount"></div>
      <button class="btn btn-sm btn-secondary" id="btnDeselect">取消选中</button>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title designer-toggle" id="designerToggle">🔧 拼图设计器 <span class="toggle-arrow">▼</span></h3>
      <div class="piece-designer" id="pieceDesigner">
        <canvas class="designer-canvas" id="designerCanvas" width="240" height="240"></canvas>
        <div class="designer-controls">
          <input type="text" class="designer-name-input" id="designerName" placeholder="拼图块名称" maxlength="20">
          <button class="btn btn-sm btn-primary" id="btnSavePiece">保存到拼图库</button>
        </div>
        <p class="designer-hint">点击网格切换格子，创建你需要的形状</p>
      </div>
    </div>

    <div class="sidebar-section sidebar-actions">
      <button class="btn btn-sm" id="btnExport">📥 导出 JSON</button>
      <button class="btn btn-sm" id="btnImport">📤 导入 JSON</button>
      <input type="file" id="importFileInput" accept=".json" style="display:none;">
    </div>
  </aside>

  <!-- Main Area -->
  <main class="polyomino-main">
    <div class="board-toolbar">
      <div class="board-size-controls">
        <label>行 <input type="number" id="boardRows" value="8" min="2" max="50" class="size-input"></label>
        <label>列 <input type="number" id="boardCols" value="8" min="2" max="50" class="size-input"></label>
        <button class="btn btn-sm btn-primary" id="btnUpdateSize">更新棋盘</button>
      </div>
      <div class="board-action-controls">
        <button class="btn btn-sm" id="btnUndo" title="撤销 (Ctrl+Z)">↩ 撤销</button>
        <button class="btn btn-sm btn-danger" id="btnClear">🗑 清空棋盘</button>
      </div>
      <div class="board-session-controls">
        <button class="btn btn-sm" id="btnSaveSession">💾 保存</button>
        <button class="btn btn-sm" id="btnLoadSession">📂 加载</button>
      </div>
    </div>

    <div class="board-container">
      <canvas id="boardCanvas"></canvas>
    </div>

    <div class="board-legend" id="boardLegend">
      <!-- Populated by JS -->
    </div>

    <div class="placement-hint">
      💡 从左侧拼图库选择拼图块，然后点击棋盘放置 | R/H/V 变换 | Esc 取消 | Shift+点击连续放置
    </div>
  </main>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/polyomino-studio.js') }}"></script>
{% endblock %}
