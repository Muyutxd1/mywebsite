{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.kb-layout {
  max-width: 900px; margin: 0 auto; padding: 8px 20px 32px;
}

.kb-header {
  text-align: center; padding: 24px 0 8px;
}
.kb-header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
.kb-header .subtitle { font-size: 14px; color: var(--text-muted); }

/* ── Search ──────────────────────── */
.kb-search-wrap {
  position: sticky; top: 52px; z-index: 20;
  padding: 8px 0; background: var(--bg);
}
.kb-search {
  width: 100%; padding: 12px 18px;
  font-size: 15px; font-family: var(--font);
  border: 2px solid var(--border); border-radius: 10px;
  background: var(--bg-card); color: var(--text);
  transition: border-color 0.15s;
}
.kb-search:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
.kb-search::placeholder { color: var(--text-muted); }
.kb-search-results {
  font-size: 12px; color: var(--text-muted);
  padding: 4px 4px 0; text-align: right;
}

/* ── Chapter accordion ────────────── */
.kb-chapter {
  margin-bottom: 6px;
  border: 1px solid var(--border-light);
  border-radius: 10px;
  background: var(--bg-card);
  overflow: hidden;
  transition: box-shadow 0.15s;
}
.kb-chapter.open { box-shadow: var(--shadow-sm); }

.kb-chapter-header {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 18px; cursor: pointer;
  user-select: none; transition: background 0.12s;
}
.kb-chapter-header:hover { background: var(--bg-input); }
.kb-chapter-num {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.kb-chapter-title {
  flex: 1; font-size: 16px; font-weight: 700;
}
.kb-chapter-count {
  font-size: 12px; color: var(--text-muted); margin-right: 4px;
}
.kb-chapter-arrow {
  font-size: 14px; color: var(--text-muted); transition: transform 0.2s;
  flex-shrink: 0;
}
.kb-chapter.open .kb-chapter-arrow { transform: rotate(180deg); }

.kb-chapter-body {
  display: none;
  border-top: 1px solid var(--border-light);
  padding: 0 18px;
}
.kb-chapter.open .kb-chapter-body { display: block; }

/* ── Entry ────────────────────────── */
.kb-entry {
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}
.kb-entry:last-child { border-bottom: none; }

.kb-entry-header {
  display: flex; align-items: baseline; gap: 10px;
  flex-wrap: wrap;
}
.kb-entry-id {
  font-size: 11px; color: var(--text-muted);
  font-family: "SF Mono","Fira Code",monospace;
  min-width: 28px;
}
.kb-entry-title {
  font-size: 15px; font-weight: 700; color: var(--text);
}
.kb-entry-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
.kb-entry-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: var(--accent-light); color: var(--accent);
  font-weight: 600; white-space: nowrap;
  border: 1px solid rgba(108,92,231,0.15);
}

.kb-entry-body {
  margin-top: 8px;
  font-size: 14px; line-height: 1.7; color: var(--text-secondary);
}
.kb-entry-body .formula-block {
  display: block; margin: 6px 0; padding: 10px 16px;
  background: var(--bg-input); border-radius: 8px;
  overflow-x: auto;
  border-left: 3px solid var(--accent);
}
.kb-entry-body .detail-text {
  margin-top: 4px; font-size: 13px;
}

/* ── Loading / Empty ──────────────── */
.kb-loading { text-align: center; padding: 60px; color: var(--text-muted); }
.kb-empty {
  text-align: center; padding: 40px; color: var(--text-muted);
  font-size: 14px;
}

/* ── Legend ───────────────────────── */
.kb-legend {
  display: flex; gap: 16px; flex-wrap: wrap; padding: 12px 18px;
  font-size: 11px; color: var(--text-muted);
  background: var(--bg-card); border-radius: 10px;
  border: 1px solid var(--border-light); margin-bottom: 16px;
  align-items: center;
}
.kb-legend-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px;
}

/* ── Responsive ───────────────────── */
@media (max-width: 600px) {
  .kb-layout { padding: 4px 10px 24px; }
  .kb-chapter-header { padding: 10px 14px; }
  .kb-chapter-title { font-size: 14px; }
  .kb-entry-header { gap: 4px; }
  .kb-entry-title { font-size: 13px; }
}
</style>
{% endblock %}

{% block content %}
<div class="kb-layout">
  <div class="kb-header">
    <h1>{{ title }}</h1>
    <p class="subtitle">{{ subtitle }}</p>
  </div>

  <div class="kb-search-wrap">
    <input type="text" class="kb-search" id="kbSearch"
           placeholder="搜索知识点...（支持标题、公式、描述）">
    <div class="kb-search-results" id="kbSearchResults"></div>
  </div>

  <div class="kb-legend">
    <span><span class="kb-legend-dot" style="background:var(--accent)"></span> 核心/基础</span>
    <span><span class="kb-legend-dot" style="background:#e67e22"></span> 进阶/中级</span>
    <span><span class="kb-legend-dot" style="background:#27ae60"></span> 视野拓展</span>
    <span><span class="kb-legend-dot" style="background:#e74c3c"></span> 竞赛高频</span>
    <span style="margin-left:auto">点击章节展开 ↓</span>
  </div>

  <div id="kbContainer">
    <div class="kb-loading">加载中...</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script id="kbConfig" type="text/json">{{ {'kb': kb} | tojson | safe }}</script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="{{ url_for('static', filename='js/knowledge_base.js') }}"></script>
{% endblock %}
