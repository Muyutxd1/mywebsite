{% extends "base.html" %}
{% block title %}奥赛习题集 — MathNet 题库{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
.problems-layout {
  max-width: 1000px; margin: 0 auto; padding: 8px 20px 32px;
}
.problems-header {
  text-align: center; padding: 20px 0 4px;
}
.problems-header h1 { font-size: 24px; font-weight: 700; }
.problems-header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ── Tab bar ──────────────────────── */
.problems-tabs {
  display: flex; gap: 0; border-bottom: 2px solid var(--border);
  margin-bottom: 16px;
  position: sticky; top: 52px; z-index: 20; background: var(--bg);
}
.problems-tab {
  padding: 10px 20px; font-size: 14px; font-weight: 600;
  border: none; background: transparent; color: var(--text-muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s;
  font-family: var(--font);
}
.problems-tab:hover { color: var(--text); }
.problems-tab.active {
  color: var(--accent); border-bottom-color: var(--accent);
}

/* ── Filter bar ───────────────────── */
.problems-filters {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  margin-bottom: 16px;
}
.problems-filter {
  padding: 7px 12px; font-size: 13px; font-family: var(--font);
  border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--bg-card); color: var(--text);
  cursor: pointer; min-width: 100px;
}
.problems-filter:focus { outline: none; border-color: var(--accent); }
.problems-search {
  flex: 1; min-width: 160px; padding: 7px 14px;
  font-size: 13px; font-family: var(--font);
  border: 1.5px solid var(--border); border-radius: 20px;
  background: var(--bg-card); color: var(--text);
}
.problems-search:focus { outline: none; border-color: var(--accent); }
.problems-search::placeholder { color: var(--text-muted); }

.problems-btn {
  padding: 7px 16px; font-size: 13px; font-weight: 600;
  font-family: var(--font); border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--bg-card); color: var(--text);
  cursor: pointer; transition: all 0.12s; white-space: nowrap;
}
.problems-btn:hover { background: var(--accent-light); border-color: var(--accent); }
.problems-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.problems-btn.primary:hover { background: var(--accent-hover); }

.problems-count {
  font-size: 12px; color: var(--text-muted); margin-left: auto;
  white-space: nowrap;
}

/* ── Problem cards ────────────────── */
.problems-list { display: flex; flex-direction: column; gap: 8px; }

.problem-card {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: 10px; overflow: hidden;
  transition: box-shadow 0.15s;
}
.problem-card:hover { box-shadow: var(--shadow-sm); }
.problem-card.expanded { box-shadow: var(--shadow-sm); border-color: var(--border); }

.problem-card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.problem-card-header:hover { background: var(--bg-input); }

.problem-id {
  font-size: 11px; color: var(--text-muted);
  font-family: "SF Mono","Fira Code",monospace; white-space: nowrap;
  min-width: 80px;
}
.problem-title {
  flex: 1; font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.problem-tags { display: flex; gap: 4px; flex-shrink: 0; }
.problem-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg-input); color: var(--text-secondary);
  font-weight: 600; white-space: nowrap;
}
.problem-tag.diff-easy { background: #e8f5e9; color: #27ae60; }
.problem-tag.diff-medium { background: #fff3e0; color: #e67e22; }
.problem-tag.diff-hard { background: #fdecea; color: #e74c3c; }

.problem-arrow {
  font-size: 12px; color: var(--text-muted); transition: transform 0.2s;
}
.problem-card.expanded .problem-arrow { transform: rotate(180deg); }

.problem-card-body {
  display: none; padding: 0 16px 16px;
  border-top: 1px solid var(--border-light);
}
.problem-card.expanded .problem-card-body { display: block; }

.problem-content {
  margin-top: 14px; font-size: 14px; line-height: 1.85;
  color: var(--text);
}
.problem-content p { margin: 0.5em 0; }
.problem-content .katex-display { margin: 0.6em 0; overflow-x: auto; overflow-y: hidden; }
.problem-content img { max-width: 100%; border-radius: 6px; }

.solution-toggle {
  margin-top: 14px; padding: 10px 16px;
  background: var(--accent-light); border: 1px solid rgba(108,92,231,0.2);
  border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  color: var(--accent); text-align: center; transition: background 0.12s;
  font-family: var(--font);
}
.solution-toggle:hover { background: rgba(108,92,231,0.12); }
.solution-content {
  margin-top: 12px; padding: 14px 18px;
  background: #fafbfc; border-radius: 8px;
  font-size: 14px; line-height: 1.85;
  border-left: 3px solid var(--accent);
}
.solution-content .katex-display { margin: 0.6em 0; overflow-x: auto; overflow-y: hidden; }

/* ── Random mode ───────────────────── */
.random-panel {
  text-align: center; padding: 24px 0 8px;
}
.random-panel .random-btn {
  padding: 14px 36px; font-size: 17px; font-weight: 700;
  font-family: var(--font); border: none; border-radius: 12px;
  background: var(--accent); color: #fff; cursor: pointer;
  transition: background 0.15s;
}
.random-panel .random-btn:hover { background: var(--accent-hover); }
.random-meta { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

/* ── Loading / Empty ──────────────── */
.problems-loading { text-align: center; padding: 48px; color: var(--text-muted); }
.problems-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

/* ── Pagination ───────────────────── */
.problems-pager {
  display: flex; justify-content: center; align-items: center;
  gap: 8px; margin-top: 20px; padding: 12px 0;
}
.problems-pager button {
  padding: 6px 14px; font-size: 13px; font-family: var(--font);
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--bg-card); cursor: pointer; transition: all 0.12s;
}
.problems-pager button:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent); }
.problems-pager button:disabled { opacity: 0.4; cursor: default; }
.problems-pager .page-info { font-size: 13px; color: var(--text-muted); }

@media (max-width: 600px) {
  .problems-layout { padding: 4px 8px 24px; }
  .problems-filters { gap: 4px; }
  .problems-filter { min-width: 60px; font-size: 11px; padding: 5px 8px; }
  .problem-card-header { padding: 10px 12px; gap: 6px; }
  .problem-title { font-size: 12px; }
  .problem-tags { display: none; }
}
</style>
{% endblock %}

{% block content %}
<div class="problems-layout">
  <div class="problems-header">
    <h1>🧮 奥赛习题集</h1>
    <p class="subtitle">MathNet 开源题库 · 30,676 道竞赛题 · CC BY 4.0</p>
  </div>

  <div class="problems-tabs">
    <button class="problems-tab active" data-tab="browse">📋 浏览</button>
    <button class="problems-tab" data-tab="random">🎲 随机练习</button>
  </div>

  <!-- Browse mode -->
  <div id="tabBrowse">
    <div class="problems-filters">
      <select class="problems-filter" id="fCompetition"><option value="">全部赛事</option></select>
      <select class="problems-filter" id="fTopic"><option value="">全部主题</option></select>
      <select class="problems-filter" id="fDifficulty"><option value="">全部难度</option></select>
      <select class="problems-filter" id="fYear"><option value="">全部年份</option></select>
      <input type="text" class="problems-search" id="fSearch" placeholder="🔍 搜索题目...">
      <span class="problems-count" id="problemsCount"></span>
    </div>
    <div class="problems-list" id="problemsList"></div>
    <div class="problems-pager" id="problemsPager"></div>
  </div>

  <!-- Random mode -->
  <div id="tabRandom" style="display:none;">
    <div class="random-panel">
      <button class="random-btn" id="randomBtn">🎲 随机抽一道题</button>
      <div class="random-meta" id="randomMeta"></div>
    </div>
    <div class="problems-list" id="randomCard"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="{{ url_for('static', filename='js/problems.js') }}"></script>
{% endblock %}
